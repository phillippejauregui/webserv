server {
    server_name main;
    listen 8080;
    host localhost;
    root /var/www;
    index index.html;
    client_max_body_size 1048576;
    error_page 404.html;

    location / {
        allow_methods GET POST;
        root /var/www;
        index index.html;
        autoindex off;
    }

    location /upload {
        allow_methods POST;
        root /tmp/uploads;
        autoindex on;
        upload_store /tmp/uploads;
    }

    location /delete {
        allow_methods DELETE;
        root /tmp/uploads;
    }

    location /cgi {
        allow_methods GET POST;
        root /var/www/cgi-bin;
        cgi .py /usr/bin/python3;
    }

    location /old {
        allow_methods GET;
        return /new;
    }
}
