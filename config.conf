server {
    listen 8080;
    host 127.0.0.1;
    server_name example;
    location / {
        root websites/default_root;
        allow_methods GET;
        autoindex off;
    }
    location ~ .bla$ {
        root websites/default_root;
        allow_methods POST;
        cgi .bla /path/to/cgi_test;
    }
    location /post_body {
        root websites/default_root;
        allow_methods POST;
        client_max_body_size 100;
    }
    location /directory/ {
        root websites/YoupiBanane;
        allow_methods GET;
        index youpi.bad_extension;
        autoindex off;
    }
}
